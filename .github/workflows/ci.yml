name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  release:
    name: Release checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-lock

      - name: Run release surface checks
        shell: pwsh
        run: ./dev/tools/release_check

      - name: Run public export source audit
        shell: pwsh
        run: ./dev/tools/check_export -WarnOnly -WarningLimit 200

      - name: Build sanitized public export
        shell: pwsh
        run: |
          $export = Join-Path $env:RUNNER_TEMP 'dataphyre-export'
          ./dev/tools/prepare_export -Output $export

      - name: Lint PHP files
        shell: pwsh
        run: ./dev/tools/lint_php.ps1

      - name: Run MCP self-test
        run: php dev/tools/mcp_self_test.php

      - name: Run MCP live validation
        run: php dev/tools/mcp_live_validate.php
