name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  public:
    name: Public checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-lock

      - name: Lint PHP files
        shell: pwsh
        run: ./dev/tools/public/lint_php.ps1

      - name: Run MCP self-test
        run: php dev/tools/public/mcp_self_test.php

      - name: Run MCP live validation
        run: php dev/tools/public/mcp_live_validate.php
