name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  release:
    name: Release checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-lock

      - name: Run release surface checks
        shell: pwsh
        run: ./tools/release_check

      - name: Run public export checks
        shell: pwsh
        run: ./tools/check_export

      - name: Build sanitized public export
        shell: pwsh
        run: |
          $export = Join-Path $env:RUNNER_TEMP 'dataphyre-export'
          ./tools/prepare_export -Output $export

      - name: Lint PHP files
        shell: pwsh
        run: ./tools/lint_php.ps1
